name: Build & validate

on:
  push:
    branches: [main, "release/**"]
  pull_request:

env:
  SFOS_VERSION: "5.0.0.62"

jobs:
  # ── Job 1: build RPMs for both architectures ────────────────────────────────
  #
  # The build engine container is 32-bit (i486). GitHub Actions' Node.js
  # runtime (used by actions/checkout, upload-artifact, etc.) is 64-bit and
  # cannot execute inside a 32-bit container. So we do NOT use `container:`.
  # Instead we check out the code on the runner as normal, then invoke mb2
  # (the actual build tool) via `docker run` for the compile + RPM steps.
  build:
    name: Build RPM (${{ matrix.target }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: i486          # emulator
          - target: aarch64       # Jolla Phone 2026, Jolla C2, Xperia

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        env:
          TARGET: ${{ matrix.target }}
        run: |
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/build" \
            -w /build \
            --user mersdk \
            ghcr.io/juergenbr/karakeep-build-env:latest \
            mb2 -t "SailfishOS-${SFOS_VERSION}-${TARGET}" \
                -s rpm/harbour-karakeep.spec \
                build

      - name: List produced RPMs
        run: ls -lh "${GITHUB_WORKSPACE}/RPMS/"

      - name: Upload RPM
        uses: actions/upload-artifact@v4
        with:
          name: harbour-karakeep-${{ matrix.target }}-rpm
          path: RPMS/*.rpm
          retention-days: 14

  # ── Job 2: integration tests (optional, needs API credentials) ────────────────
  test:
    name: API integration tests
    runs-on: ubuntu-latest
    if: vars.KARAKEEP_URL != ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build test binary
        run: |
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/build" \
            -w /build \
            --user mersdk \
            ghcr.io/juergenbr/karakeep-build-env:latest \
            bash -c "qmake tests/tests.pro -o tests/Makefile && make -C tests -f Makefile"

      - name: Run tests
        env:
          KARAKEEP_URL: ${{ vars.KARAKEEP_URL }}
          KARAKEEP_API_KEY: ${{ secrets.KARAKEEP_API_KEY }}
        run: |
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/build" \
            -w /build \
            --user mersdk \
            -e KARAKEEP_URL \
            -e KARAKEEP_API_KEY \
            ghcr.io/juergenbr/karakeep-build-env:latest \
            tests/tst_karakeepapi -v2
