name: Build & validate

# Runs on every PR to main. Ensures the code compiles on both architectures
# before merging. RPM building for releases is handled in release-please.yml.
on:
  pull_request:
    branches: [main]

env:
  SFOS_VERSION: "5.0.0.62"

jobs:
  # ── Build RPMs for both architectures ────────────────────────────────────────
  #
  # The build engine container is 32-bit (i486). GitHub Actions' Node.js
  # runtime (used by actions/checkout, upload-artifact, etc.) is 64-bit and
  # cannot execute inside a 32-bit container. So we do NOT use `container:`.
  # Instead we check out the code on the runner as normal, then invoke mb2
  # (the actual build tool) via `docker run` for the compile + RPM steps.
  # Source must be mounted at /home/mersdk/build so sb2 path mappings apply.
  build:
    name: Build RPM (${{ matrix.target }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: i486          # emulator
          - target: aarch64       # Jolla Phone 2026, Jolla C2, Xperia (64-bit)
          - target: armv7hl       # Jolla 1, Jolla C, older Xperia (32-bit ARM)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        env:
          TARGET: ${{ matrix.target }}
        run: |
          chmod -R a+rw "${GITHUB_WORKSPACE}"
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/home/mersdk/build" \
            -w /home/mersdk/build \
            --user mersdk \
            ghcr.io/juergenbr/karakeep-build-env:latest \
            mb2 -t "SailfishOS-${SFOS_VERSION}-${TARGET}" \
                -s rpm/harbour-karakeep.spec \
                build

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: harbour-karakeep-${{ matrix.target }}-rpm
          path: RPMS/*.rpm
          retention-days: 14

  # ── Integration tests (optional, needs API credentials) ──────────────────────
  #
  # Only runs when KARAKEEP_URL is configured as a repository variable.
  test:
    name: API integration tests
    runs-on: ubuntu-latest
    if: vars.KARAKEEP_URL != ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build test binary
        run: |
          chmod -R a+rw "${GITHUB_WORKSPACE}"
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/home/mersdk/build" \
            -w /home/mersdk/build \
            --user mersdk \
            ghcr.io/juergenbr/karakeep-build-env:latest \
            mb2 -t "SailfishOS-${SFOS_VERSION}-i486" \
                -s rpm/tst_karakeepapi.spec \
                build

      - name: Run tests
        env:
          KARAKEEP_API_KEY: ${{ secrets.KARAKEEP_API_KEY }}
        run: |
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/home/mersdk/build" \
            -w /home/mersdk/build \
            --user mersdk \
            -e KARAKEEP_API_KEY \
            ghcr.io/juergenbr/karakeep-build-env:latest \
            bash -c "export LD_LIBRARY_PATH=/srv/mer/targets/SailfishOS-${SFOS_VERSION}-i486/usr/lib:\$LD_LIBRARY_PATH; tests/tst_karakeepapi -v2"
