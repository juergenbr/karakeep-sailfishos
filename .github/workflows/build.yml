name: Build & validate

# ── Triggers ───────────────────────────────────────────────────────────────────
#
# pull_request  → validate that the code compiles (gate for merging)
# release       → build both arches and attach RPMs to the GitHub Release
#                 that release-please created
on:
  pull_request:
    branches: [main]
  release:
    types: [published]

env:
  SFOS_VERSION: "5.0.0.62"

jobs:
  # ── Build RPMs for both architectures ────────────────────────────────────────
  #
  # The build engine container is 32-bit (i486). GitHub Actions' Node.js
  # runtime (used by actions/checkout, upload-artifact, etc.) is 64-bit and
  # cannot execute inside a 32-bit container. So we do NOT use `container:`.
  # Instead we check out the code on the runner as normal, then invoke mb2
  # (the actual build tool) via `docker run` for the compile + RPM steps.
  # Source must be mounted at /home/mersdk/build so sb2 path mappings apply.
  build:
    name: Build RPM (${{ matrix.target }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: i486          # emulator
          - target: aarch64       # Jolla Phone 2026, Jolla C2, Xperia

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        env:
          TARGET: ${{ matrix.target }}
        run: |
          chmod -R a+rw "${GITHUB_WORKSPACE}"
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/home/mersdk/build" \
            -w /home/mersdk/build \
            --user mersdk \
            ghcr.io/juergenbr/karakeep-build-env:latest \
            mb2 -t "SailfishOS-${SFOS_VERSION}-${TARGET}" \
                -s rpm/harbour-karakeep.spec \
                build

      - name: List produced RPMs
        run: ls -lh "${GITHUB_WORKSPACE}/RPMS/"

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: harbour-karakeep-${{ matrix.target }}-rpm
          path: RPMS/*.rpm
          retention-days: 14

  # ── Integration tests (optional, needs API credentials) ──────────────────────
  #
  # Only runs on pull requests (not releases) and only when KARAKEEP_URL is set.
  test:
    name: API integration tests
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && vars.KARAKEEP_URL != ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build test binary
        run: |
          chmod -R a+rw "${GITHUB_WORKSPACE}"
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/home/mersdk/build" \
            -w /home/mersdk/build \
            --user mersdk \
            ghcr.io/juergenbr/karakeep-build-env:latest \
            bash -c "qmake tests/tests.pro -o tests/Makefile && make -C tests -f Makefile"

      - name: Run tests
        env:
          KARAKEEP_URL: ${{ vars.KARAKEEP_URL }}
          KARAKEEP_API_KEY: ${{ secrets.KARAKEEP_API_KEY }}
        run: |
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/home/mersdk/build" \
            -w /home/mersdk/build \
            --user mersdk \
            -e KARAKEEP_URL \
            -e KARAKEEP_API_KEY \
            ghcr.io/juergenbr/karakeep-build-env:latest \
            tests/tst_karakeepapi -v2

  # ── Attach RPMs to the GitHub Release ────────────────────────────────────────
  #
  # Only runs when a release is published (by release-please).
  # Downloads the matrix artifacts and uploads them to the existing release.
  attach-rpms:
    name: Attach RPMs to release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    permissions:
      contents: write

    steps:
      - name: Download RPM artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-rpms
          merge-multiple: true

      - name: List RPMs
        run: ls -lh release-rpms/

      - name: Upload RPMs to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-rpms/*.rpm
          fail_on_unmatched_files: true
